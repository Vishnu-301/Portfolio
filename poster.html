<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vishnu.dev — Digital Solutions</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --bg: #050a0e;
            --panel: #0b1117;
            --border: #1a2a35;
            --accent: #00ffe0;
            --accent2: #0088ff;
            --text: #e0f0ff;
            --muted: #4a6a7a;
        }

        .light-mode {
            --bg: #f5f7fa;
            --panel: #ffffff;
            --border: #dbe4ec;
            --text: #0a192f;
            --muted: #6b7b8c;
        }

        body {
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Space Mono', monospace;
            color: var(--text);
            padding: 20px;
            transition: .3s;
        }

        .flyer {
            width: 650px;
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 40px;
            position: relative;
            box-shadow: 0 0 60px rgba(0, 255, 224, .05);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .brand {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            /* minimized */
            font-weight: 700;
            letter-spacing: 1px;
        }

        .toggle {
            cursor: pointer;
            font-size: 12px;
            border: 1px solid var(--border);
            padding: 6px 10px;
        }

        .tagline {
            font-size: 12px;
            color: var(--muted);
            margin-top: 5px;
        }

        .services {
            margin: 30px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .service {
            border: 1px solid var(--border);
            padding: 10px 15px;
            font-size: 12px;
            transition: .2s;
        }

        .service:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .buttons {
            margin-top: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            text-decoration: none;
            font-size: 12px;
            padding: 10px 18px;
            border: 1px solid var(--border);
            transition: .2s;
        }

        .btn:hover {
            background: var(--accent);
            color: #000;
        }

        .bottom {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 20px;
        }

        .contact {
            font-size: 12px;
            line-height: 1.8;
        }

        .qr {
            background: #fff;
            padding: 5px;
        }

        .location {
            margin-top: 10px;
            font-size: 11px;
            color: var(--muted);
        }
    </style>
</head>

<body>

    <div class="flyer">

        <div class="top">
            <div>
                <div class="brand">Felix.dev</div>
                <div class="tagline">Digital Solutions • Web • Software • Branding</div>
            </div>
            <div class="toggle" onclick="toggleMode()">Toggle Mode</div>
        </div>

        <div class="services">
            <div class="service">Web Design</div>
            <div class="service">Full-Stack Development</div>
            <div class="service">UI/UX Design</div>
            <div class="service">E-Commerce Solutions</div>
            <div class="service">Brand Identity</div>
            <div class="service">Tech Consulting</div>
        </div>

        <div class="buttons">
            <a href="#" class="btn">View Portfolio</a>
            <a href="mailto:your@email.com" class="btn">Send Email</a>
            <a href="https://wa.me/2349058928611" target="_blank" class="btn">WhatsApp</a>
        </div>

        <div class="bottom">
            <div class="contact">
                Phone: +234 905 892 8611 <br>
                Email: ifyifeanyi301@gmail.com
                <div class="location">Based in Nigeria • Available Worldwide</div>
            </div>

            <div class="qr">
                <div id="qrcode"></div>
            </div>
        </div>

    </div>

    <script>
        new QRCode(document.getElementById("qrcode"), {
            text: "https://wa.me/2349058928611",
            width: 90,
            height: 90
        });

        function toggleMode() {
            document.body.classList.toggle("light-mode");
        }
    </script>

</body>

</html>
