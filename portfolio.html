<!DOCTYPE html>

    <title>Portfolio — felix portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.9.0/css/all.min.css"

        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="public/css/style.css" />
</head>

<style>
    .reveal {
        opacity: 0;
        transform: translateY(18px);
        transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .reveal.in-view {
        opacity: 1;
        transform: translateY(0);
    }
</style>

<body class="bg-gradient-to-b from-white to-gray-50">
    <!-- Navigation -->
    <nav class="fixed top-0 w-full bg-white/95 backdrop-blur-sm shadow-sm z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="text-2xl font-bold text-gray-900">Felix.Dev</a>

                <!-- Mobile menu button -->
                <button id="mobileMenuBtn" class="md:hidden p-2" aria-label="Toggle menu">

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16">

                            viewBox="0 0 24 24">
                            <path

                        </svg>

                            <path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z" />
                        </svg>

                <a href="#skills" class="block text-gray-700 hover:text-blue-600 transition py-2">Skills</a>
                <a href="#featured" class="block text-gray-700 hover:text-blue-600 transition py-2">Projects</a>

                <a href="poster.html" class="block text-gray-700 hover:text-blue-600 transition py-2">Card</a>
                <button id="themeToggleMobile" aria-label="Toggle dark mode"
                    class="flex items-center gap-2 py-2 text-gray-700 dark:text-gray-200">
                    <span id="mobileThemeLabel">Switch to Dark Mode</span>
                </button>
            </div>

    <main class="py-20 px-4 sm:px-6">
        <div class="max-w-6xl mx-auto">

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 featured-projects">
                <!-- projrcts here -->

            <p>&copy; 2025 Felix Portfolio. Crafted with care.</p>
        </div>
    </footer>

    <script src="public/js/main.js"></script>
